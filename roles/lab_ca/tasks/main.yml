---
# install the environment's internal CA certificate into the system trust store
# so the host trusts internal tls. the certificate itself is ENVIRONMENT-SPECIFIC
# and lives in the control repo (each environment has its own CA) — this role only
# installs whatever cert the control repo points it at. provide the cert either as
# inline PEM (`lab_ca_cert_content`, e.g. from a hoisted CA global) or as a file
# path (`lab_ca_cert_src`); content wins when both are set.
#
# the whole role is gated on lab_ca_enabled: hosts that live outside the lab set
# it false in group_vars and the role no-ops (no assert, no cert install).
- name: manage the lab ca certificate
  when: lab_ca_enabled | bool
  block:
    - name: assert a lab ca certificate is provided
      ansible.builtin.assert:
        that:
          - (lab_ca_cert_content | length > 0) or (lab_ca_cert_src | length > 0)
        fail_msg: >-
          set lab_ca_cert_content (inline PEM) or lab_ca_cert_src (a path) to this
          environment's CA certificate. The cert lives in the control repo, not in
          this shared role.

    - name: ensure lab ca certificate is installed (from content)
      ansible.builtin.copy:
        content: "{{ lab_ca_cert_content }}"
        dest: "/usr/local/share/ca-certificates/{{ lab_ca_cert_name }}"
        owner: root
        group: root
        mode: '0644'
      when: lab_ca_cert_content | length > 0
      notify:
        - update-ca-certificates

    - name: ensure lab ca certificate is installed (from file)
      ansible.builtin.copy:
        src: "{{ lab_ca_cert_src }}"
        dest: "/usr/local/share/ca-certificates/{{ lab_ca_cert_name }}"
        owner: root
        group: root
        mode: '0644'
      when:
        - lab_ca_cert_content | length == 0
        - lab_ca_cert_src | length > 0
      notify:
        - update-ca-certificates
