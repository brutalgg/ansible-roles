---
# debian-family package upgrade. dietpi hosts are upgraded with apt here too
# (the regular cadence); the dietpi platform updater is a separate, intentional
# path (tasks/dietpi-update.yml, playbooks/update.yml --tags dietpi).
- name: upgrade apt packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: safe
    autoremove: true

- name: detect reboot required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: base__reboot_required_file

# safe to reboot inline: playbooks/update.yml runs this play serial: 1, so only
# one host (e.g. one of the HA dns pis) is ever down at a time.
- name: reboot if required
  ansible.builtin.reboot:
    connect_timeout: 5
    reboot_timeout: 300
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: uptime
    msg: rebooting after package upgrade
  when: base__reboot_required_file.stat.exists
