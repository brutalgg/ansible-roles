---
- name: detect dietpi
  ansible.builtin.stat:
    path: /boot/dietpi/.version
  register: base__dietpi
  changed_when: false

- name: set deb822 usage fact
  ansible.builtin.set_fact:
    base__use_deb822: >-
      {{
        (ansible_facts['distribution'] | lower == 'debian')
        and
        (ansible_facts['distribution_major_version'] is version('13', '>='))
        and
        (not base__dietpi.stat.exists)
      }}

- name: ensure apt sources for dietpi
  ansible.builtin.template:
    src: "apt/sources_dietpi.list.j2"
    dest: /etc/apt/sources.list.d/dietpi.list
    owner: root
    group: root
    mode: '0644'
  when:
    - base__dietpi.stat.exists

- name: ensure apt sources for debian 13+ using deb822
  ansible.builtin.template:
    src: "apt/{{ ansible_facts['distribution_release'] }}.sources.j2"
    dest: "/etc/apt/sources.list.d/debian.sources"
    owner: root
    group: root
    mode: '0644'
  when:
    - base__use_deb822

- name: ensure apt sources for other distributions
  ansible.builtin.template:
    src: "apt/sources_{{ ansible_facts['distribution_release'] | lower }}.list.j2"
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: '0644'
  when:
    - not base__dietpi.stat.exists
    - not base__use_deb822

