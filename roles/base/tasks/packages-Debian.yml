#     path: "/etc/apt/sources.list.d/debian.sources"
#     state: absent
#   when: ansible_facts['distribution_release'] in excluded_apt_sources

# provisioning refreshes the cache and installs required packages but does NOT
# upgrade versions or reboot — that is the deliberate, out-of-band update path
# (tasks/update.yml, reached via playbooks/update.yml). see docs/STANDARDS.md §3.1.
- name: update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 86400

- name: ensure extra packages present
  ansible.builtin.package:
    name: "{{ base_extra_packages }}"
    state: present
